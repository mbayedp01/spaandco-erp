name: Supabase Keep-Alive

on:
  schedule:
    # Tous les 5 jours à 08h00 UTC
    - cron: '0 8 */5 * *'
  workflow_dispatch: # déclenche manuel si besoin

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase via l'API de l'app
        run: |
          STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" --max-time 15 "${{ secrets.SITE_URL }}/api/ping")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Supabase actif ✓"
          else
            echo "Ping retourné $STATUS — Supabase toujours actif via la requête curl elle-même"
          fi
