name: Supabase Keep-Alive

on:
  schedule:
    # Tous les 5 jours à 08h00 UTC
    - cron: '0 8 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase directement
        continue-on-error: true
        run: |
          curl -s --max-time 15 \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/establishments?select=id&limit=1" \
            -o /dev/null -w "HTTP %{http_code}\n"

      - name: Résultat
        run: echo "Supabase keep-alive envoyé ✓"
